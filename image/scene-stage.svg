<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <!-- Fond sombre profond -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#04020C"/>
      <stop offset="60%"  stop-color="#0A0515"/>
      <stop offset="100%" stop-color="#100820"/>
    </linearGradient>
    <!-- Plancher bois en perspective -->
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1A0F05"/>
      <stop offset="50%"  stop-color="#2C1A08"/>
      <stop offset="100%" stop-color="#3D2510"/>
    </linearGradient>
    <!-- Reflet de sol -->
    <linearGradient id="floorShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Rideau gauche -->
    <linearGradient id="curtainL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0D0008"/>
      <stop offset="60%"  stop-color="#1A0015"/>
      <stop offset="100%" stop-color="#2A0025"/>
    </linearGradient>
    <!-- Rideau droit -->
    <linearGradient id="curtainR" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#0D0008"/>
      <stop offset="60%"  stop-color="#1A0015"/>
      <stop offset="100%" stop-color="#2A0025"/>
    </linearGradient>
    <!-- Spot haut gauche -->
    <radialGradient id="spotL" cx="25%" cy="0%" r="60%">
      <stop offset="0%"   stop-color="#7B2FBE" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
    <!-- Spot haut droit -->
    <radialGradient id="spotR" cx="75%" cy="0%" r="60%">
      <stop offset="0%"   stop-color="#EC4899" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <!-- Spot central -->
    <radialGradient id="spotC" cx="50%" cy="20%" r="55%">
      <stop offset="0%"   stop-color="#A855F7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <!-- Brume de scène -->
    <radialGradient id="fog" cx="50%" cy="100%" r="70%">
      <stop offset="0%"   stop-color="#7B2FBE" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow LED -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Ombre douce -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- ══════ FOND ══════ -->
  <rect width="900" height="520" fill="url(#bgGrad)"/>

  <!-- Lumières d'ambiance -->
  <rect width="900" height="520" fill="url(#spotL)"/>
  <rect width="900" height="520" fill="url(#spotR)"/>
  <rect width="900" height="520" fill="url(#spotC)"/>

  <!-- ══════ STRUCTURE SCÈNE ARRIÈRE-PLAN ══════ -->
  <!-- Mur du fond -->
  <rect x="80" y="20" width="740" height="310" rx="4" fill="#0B050F" opacity="0.85"/>
  <!-- Grille LED arrière -->
  <g opacity="0.35" filter="url(#glow)">
    <!-- Rangée LED horizontale haut -->
    <rect x="100" y="32"  width="700" height="5" rx="2" fill="#A855F7"/>
    <!-- Points LED -->
    <g fill="#C084FC">
      <circle cx="130" cy="34.5" r="3.5"/><circle cx="180" cy="34.5" r="3.5"/>
      <circle cx="230" cy="34.5" r="3.5"/><circle cx="280" cy="34.5" r="3.5"/>
      <circle cx="330" cy="34.5" r="3.5"/><circle cx="380" cy="34.5" r="3.5"/>
      <circle cx="430" cy="34.5" r="3.5"/><circle cx="480" cy="34.5" r="3.5"/>
      <circle cx="530" cy="34.5" r="3.5"/><circle cx="580" cy="34.5" r="3.5"/>
      <circle cx="630" cy="34.5" r="3.5"/><circle cx="680" cy="34.5" r="3.5"/>
      <circle cx="730" cy="34.5" r="3.5"/><circle cx="770" cy="34.5" r="3.5"/>
    </g>
    <!-- Rangée LED horizontale milieu -->
    <rect x="100" y="175" width="700" height="3" rx="1" fill="#7C3AED" opacity="0.5"/>
  </g>

  <!-- ══════ PORTIQUE D'ÉCLAIRAGE ══════ -->
  <!-- Barre horizontale -->
  <rect x="85"  y="42" width="730" height="12" rx="4" fill="#1A1A2E" stroke="#2D2D4E" stroke-width="1"/>
  <!-- Montants verticaux -->
  <rect x="85"  y="20" width="12" height="34" rx="3" fill="#1A1A2E" stroke="#2D2D4E" stroke-width="1"/>
  <rect x="803" y="20" width="12" height="34" rx="3" fill="#1A1A2E" stroke="#2D2D4E" stroke-width="1"/>

  <!-- Projecteurs sur la barre -->
  <g fill="#111122" stroke="#333355" stroke-width="1">
    <!-- Projecteur 1 -->
    <rect x="115" y="46" width="18" height="14" rx="3"/>
    <polygon points="124,60 116,80 132,80" fill="#1A1030" opacity="0.6"/>
    <!-- Projecteur 2 -->
    <rect x="210" y="46" width="18" height="14" rx="3"/>
    <polygon points="219,60 211,80 227,80" fill="#1A1030" opacity="0.6"/>
    <!-- Projecteur 3 -->
    <rect x="340" y="46" width="18" height="14" rx="3"/>
    <polygon points="349,60 341,80 357,80" fill="#1A1030" opacity="0.6"/>
    <!-- Projecteur central -->
    <rect x="441" y="46" width="18" height="14" rx="3"/>
    <polygon points="450,60 442,85 458,85" fill="#3B1060" opacity="0.5"/>
    <!-- Projecteur 5 -->
    <rect x="542" y="46" width="18" height="14" rx="3"/>
    <polygon points="551,60 543,80 559,80" fill="#1A1030" opacity="0.6"/>
    <!-- Projecteur 6 -->
    <rect x="671" y="46" width="18" height="14" rx="3"/>
    <polygon points="680,60 672,80 688,80" fill="#1A1030" opacity="0.6"/>
    <!-- Projecteur 7 -->
    <rect x="766" y="46" width="18" height="14" rx="3"/>
    <polygon points="775,60 767,80 783,80" fill="#1A1030" opacity="0.6"/>
  </g>
  <!-- Lueur des projecteurs actifs -->
  <g opacity="0.5" filter="url(#glow)">
    <circle cx="124" cy="60" r="5" fill="#A855F7"/>
    <circle cx="450" cy="62" r="7" fill="#F0ABFC"/>
    <circle cx="775" cy="60" r="5" fill="#EC4899"/>
  </g>

  <!-- ══════ RIDEAUX ══════ -->
  <!-- Rideau gauche principal -->
  <path d="M 0,0 L 155,0 L 140,20 L 130,60 L 145,110 L 125,170 L 140,240 L 120,320 L 80,520 L 0,520 Z"
        fill="url(#curtainL)"/>
  <!-- Plis rideau gauche -->
  <path d="M 40,0 C 50,80 35,160 45,240 C 55,320 40,400 50,520"
        fill="none" stroke="#2A0030" stroke-width="3" opacity="0.6"/>
  <path d="M 75,0 C 90,90 70,170 85,250 C 95,320 75,420 85,520"
        fill="none" stroke="#1A0020" stroke-width="2" opacity="0.5"/>
  <path d="M 110,0 C 125,70 105,150 120,230 C 130,310 110,410 120,520"
        fill="none" stroke="#300035" stroke-width="2" opacity="0.4"/>
  <!-- Bordure velours gauche -->
  <path d="M 155,0 L 140,20 L 130,60 L 145,110 L 125,170 L 140,240 L 120,320 L 80,520"
        fill="none" stroke="#4A0050" stroke-width="3" opacity="0.7"/>

  <!-- Rideau droit principal -->
  <path d="M 900,0 L 745,0 L 760,20 L 770,60 L 755,110 L 775,170 L 760,240 L 780,320 L 820,520 L 900,520 Z"
        fill="url(#curtainR)"/>
  <!-- Plis rideau droit -->
  <path d="M 860,0 C 850,80 865,160 855,240 C 845,320 860,400 850,520"
        fill="none" stroke="#2A0030" stroke-width="3" opacity="0.6"/>
  <path d="M 825,0 C 810,90 830,170 815,250 C 805,320 825,420 815,520"
        fill="none" stroke="#1A0020" stroke-width="2" opacity="0.5"/>
  <path d="M 790,0 C 775,70 795,150 780,230 C 770,310 790,410 780,520"
        fill="none" stroke="#300035" stroke-width="2" opacity="0.4"/>
  <!-- Bordure velours droit -->
  <path d="M 745,0 L 760,20 L 770,60 L 755,110 L 775,170 L 760,240 L 780,320 L 820,520"
        fill="none" stroke="#4A0050" stroke-width="3" opacity="0.7"/>

  <!-- ══════ ENCEINTES (amplis) ══════ -->
  <!-- Stack d'amplis gauche -->
  <g filter="url(#softShadow)">
    <rect x="95"  y="255" width="75" height="90" rx="5" fill="#0D0D0D" stroke="#222" stroke-width="1.5"/>
    <rect x="100" y="260" width="65" height="38" rx="3" fill="#111" stroke="#1A1A1A" stroke-width="1"/>
    <rect x="100" y="302" width="65" height="38" rx="3" fill="#111" stroke="#1A1A1A" stroke-width="1"/>
    <!-- Grille enceinte -->
    <circle cx="132" cy="279" r="14" fill="#0A0A0A" stroke="#1E1E1E" stroke-width="1"/>
    <circle cx="132" cy="279" r="9"  fill="#050505"/>
    <circle cx="132" cy="321" r="14" fill="#0A0A0A" stroke="#1E1E1E" stroke-width="1"/>
    <circle cx="132" cy="321" r="9"  fill="#050505"/>
    <!-- LED power -->
    <circle cx="154" cy="267" r="3" fill="#A855F7" filter="url(#glow)" opacity="0.9"/>
    <circle cx="154" cy="309" r="3" fill="#7C3AED" filter="url(#glow)" opacity="0.7"/>
  </g>
  <!-- Wedge monitor gauche -->
  <path d="M 100,345 L 200,345 L 190,375 L 100,375 Z" fill="#0C0C0C" stroke="#1A1A1A" stroke-width="1"/>
  <path d="M 105,348 L 185,348 L 178,372 L 105,372 Z" fill="#080808"/>

  <!-- Stack d'amplis droit -->
  <g filter="url(#softShadow)">
    <rect x="730" y="255" width="75" height="90" rx="5" fill="#0D0D0D" stroke="#222" stroke-width="1.5"/>
    <rect x="735" y="260" width="65" height="38" rx="3" fill="#111" stroke="#1A1A1A" stroke-width="1"/>
    <rect x="735" y="302" width="65" height="38" rx="3" fill="#111" stroke="#1A1A1A" stroke-width="1"/>
    <circle cx="768" cy="279" r="14" fill="#0A0A0A" stroke="#1E1E1E" stroke-width="1"/>
    <circle cx="768" cy="279" r="9"  fill="#050505"/>
    <circle cx="768" cy="321" r="14" fill="#0A0A0A" stroke="#1E1E1E" stroke-width="1"/>
    <circle cx="768" cy="321" r="9"  fill="#050505"/>
    <circle cx="746" cy="267" r="3" fill="#EC4899" filter="url(#glow)" opacity="0.9"/>
    <circle cx="746" cy="309" r="3" fill="#A855F7" filter="url(#glow)" opacity="0.7"/>
  </g>
  <!-- Wedge monitor droit -->
  <path d="M 700,345 L 800,345 L 800,375 L 710,375 Z" fill="#0C0C0C" stroke="#1A1A1A" stroke-width="1"/>
  <path d="M 715,348 L 795,348 L 795,372 L 722,372 Z" fill="#080808"/>

  <!-- ══════ PLANCHER SCÈNE ══════ -->
  <!-- Rebord de scène avant -->
  <path d="M 50,378 L 850,378 L 870,400 L 30,400 Z" fill="#1A0F05" stroke="#2C1A08" stroke-width="1"/>
  <path d="M 50,378 L 850,378 L 850,385 L 50,385 Z" fill="#3D2510" opacity="0.6"/>
  <!-- Strip LED rebord -->
  <rect x="52"  y="386" width="796" height="4" rx="2" fill="#A855F7" filter="url(#glow)" opacity="0.55"/>

  <!-- Plancher principal -->
  <path d="M 30,400 L 870,400 L 900,520 L 0,520 Z" fill="url(#floorGrad)"/>
  <path d="M 30,400 L 870,400 L 900,520 L 0,520 Z" fill="url(#floorShine)"/>

  <!-- Lames de parquet en perspective -->
  <g stroke="#251505" stroke-width="0.8" opacity="0.5">
    <line x1="0" y1="440" x2="900" y2="437"/>
    <line x1="0" y1="470" x2="900" y2="465"/>
    <line x1="0" y1="500" x2="900" y2="493"/>
    <line x1="0" y1="520" x2="900" y2="512"/>
  </g>
  <!-- Reflets spots sur le sol -->
  <ellipse cx="450" cy="420" rx="120" ry="25" fill="#A855F7" opacity="0.08"/>
  <ellipse cx="200" cy="430" rx="60"  ry="15" fill="#7C3AED" opacity="0.06"/>
  <ellipse cx="700" cy="430" rx="60"  ry="15" fill="#EC4899" opacity="0.06"/>

  <!-- ══════ BRUME ══════ -->
  <rect x="0" y="340" width="900" height="180" fill="url(#fog)"/>

  <!-- ══════ VIGNETTE FINALE ══════ -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%"   stop-color="transparent"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
  </radialGradient>
  <rect width="900" height="520" fill="url(#vignette)"/>
</svg>
